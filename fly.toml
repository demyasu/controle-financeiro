app = 'controle-financeiro-o2saog'
primary_region = 'gru'

[build]

[[mounts]]
  source = 'data'
  destination = '/app/db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
