$kind: http-example
request:
  url: "{{base_url}}/authenticate"
  method: POST
  headers:
    Content-Type: application/x-www-form-urlencoded
  body:
    type: urlencoded
    content:
      email: "{{email}}"
      password: "{{password}}"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: text/html;charset=utf-8
  body:
    type: text
    content: ""
order: 1000
