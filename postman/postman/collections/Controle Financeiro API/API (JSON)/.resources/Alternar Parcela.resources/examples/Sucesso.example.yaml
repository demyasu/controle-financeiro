$kind: http-example
request:
  url: "{{base_url}}/api/transactions/{{transaction_id}}/toggle_installment"
  method: POST
  headers:
    Authorization: Bearer {{api_key}}
    Content-Type: application/x-www-form-urlencoded
  body:
    type: urlencoded
    content:
      installment: "1"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "id": 1,
        "paid_installments": [1],
        "installments": 3
      }
order: 1000
