$kind: http-example
request:
  url: "{{base_url}}/api/transactions/{{transaction_id}}"
  method: PATCH
  headers:
    Authorization: Bearer {{api_key}}
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "description": "{{description}} atualizado",
        "amount": {{amount}}
      }
response:
  statusCode: 404
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: '{"error": "Transação não encontrada"}'
order: 2000
