$kind: http-example
request:
  url: "{{base_url}}/api/transactions/{{transaction_id}}"
  method: PATCH
  headers:
    Authorization: Bearer {{api_key}}
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "description": "{{description}} atualizado",
        "amount": {{amount}}
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "id": 1,
        "description": "Nova transação atualizado",
        "amount": 100.0,
        "status": "Pendente"
      }
order: 1000
